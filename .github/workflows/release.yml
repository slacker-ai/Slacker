name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Signed notarized release
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_NAME: Slacker
      ARCHIVE_PATH: build/Slacker.xcarchive
      EXPORT_PATH: build/export
      DMG_PATH: build/Slacker.dmg
      APPCAST_PATH: build/appcast.xml
      UPDATES_PATH: build/updates
      SOURCE_PACKAGES_PATH: build/SourcePackages
      SPARKLE_FEED_URL: https://github.com/slacker-ai/Slacker/releases/latest/download/appcast.xml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate release configuration
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "release tag must be a semantic version such as v1.2.3" >&2
            exit 1
          }
          [[ -n "$SPARKLE_PUBLIC_ED_KEY" ]] || {
            echo "repository variable SPARKLE_PUBLIC_ED_KEY is required" >&2
            exit 1
          }
          [[ -n "$SPARKLE_EDDSA_PRIVATE_KEY" ]] || {
            echo "repository secret SPARKLE_EDDSA_PRIVATE_KEY is required" >&2
            exit 1
          }
          printf '%s' "$SPARKLE_PUBLIC_ED_KEY" | base64 --decode > "$RUNNER_TEMP/sparkle-public-key"
          [[ "$(wc -c < "$RUNNER_TEMP/sparkle-public-key" | tr -d ' ')" == "32" ]] || {
            echo "SPARKLE_PUBLIC_ED_KEY must decode to 32 bytes" >&2
            exit 1
          }
          rm -f "$RUNNER_TEMP/sparkle-public-key"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: >-
          xcodebuild -project Slacker.xcodeproj -scheme Slacker
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"
          -resolvePackageDependencies

      - name: Run tests
        run: >-
          xcodebuild test -project Slacker.xcodeproj -scheme Slacker
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"
          -destination 'platform=macOS'

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Slacker.xcodeproj \
            -scheme Slacker \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            SPARKLE_FEED_URL="$SPARKLE_FEED_URL" \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY"

      - name: Export signed app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Verify app signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "$EXPORT_PATH/$APP_NAME.app"

      - name: Verify release metadata
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          INFO_PLIST="$EXPORT_PATH/$APP_NAME.app/Contents/Info.plist"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"
          FEED="$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$INFO_PLIST")"
          PUBLIC_KEY="$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$INFO_PLIST")"
          [[ "$VERSION" == "${GITHUB_REF_NAME#v}" ]]
          [[ "$BUILD" == "$GITHUB_RUN_NUMBER" ]]
          [[ "$FEED" == "$SPARKLE_FEED_URL" ]]
          [[ "$PUBLIC_KEY" == "$SPARKLE_PUBLIC_ED_KEY" ]]

      - name: Create DMG
        run: scripts/create-dmg.sh "$EXPORT_PATH/$APP_NAME.app" "$DMG_PATH"

      - name: Sign DMG
        run: |
          set -euo pipefail
          codesign --force --sign "Developer ID Application" --timestamp "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          GENERATE_APPCAST="$SOURCE_PACKAGES_PATH/artifacts/sparkle/Sparkle/bin/generate_appcast"
          [[ -x "$GENERATE_APPCAST" ]] || {
            echo "Sparkle generate_appcast tool was not found" >&2
            exit 1
          }
          mkdir -p "$UPDATES_PATH"
          cp "$DMG_PATH" "$UPDATES_PATH/$APP_NAME.dmg"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/" \
            --full-release-notes-url "https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME" \
            --link "https://github.com/$GITHUB_REPOSITORY" \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            -o "$APPCAST_PATH" \
            "$UPDATES_PATH"
          xmllint --noout "$APPCAST_PATH"

      - name: Create checksum
        run: shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sha256
            ${{ env.APPCAST_PATH }}
